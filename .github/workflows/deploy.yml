name: Deploy Event Tracker

on:
  push:
    branches:
      - master
  workflow_dispatch:
  schedule:
    - cron: '0 21 * * *'

permissions:
  contents: write

concurrency:
  group: event-tracker
  cancel-in-progress: false

jobs:
  build:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Tokyo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate static site
        run: npm run generate:static

      - name: Copy generated site to Pages root
        run: |
          mkdir -p api
          cp site/index.html index.html
          cp site/api/events.json api/events.json
          cp site/api/concerts.json api/concerts.json

      - name: Commit generated output
        run: |
          if git diff --quiet -- index.html api/events.json api/concerts.json; then
            echo "No generated output changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html api/events.json api/concerts.json
          git commit -m "Update generated event data [skip ci]"
          git push
